<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Aggie Dash</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>

    /* ============================================================
       THEME — ALL visual settings live here.
       Dark  = [data-theme="dark"]   maroon background
       Light = [data-theme="light"]  white background
       Change colors ONLY inside these blocks.
    ============================================================ */

    /* Shared values — same in both modes */
    :root {
        --color-maroon:     #500000;
        --color-win:        #2e9e4f;
        --color-loss:       #d63031;
        --color-live:       #e53e3e;
        --radius-card:      16px;
        --radius-btn:       12px;
        --logo-size:        62px;
        --font-display:     'Black Han Sans', sans-serif;
        --font-body:        'Nunito', sans-serif;
    }

    /* DARK MODE */
    [data-theme="dark"] {
        --color-bg:              #3a0000;
        --color-bg-glow1:        rgba(100,0,0,0.45);
        --color-bg-glow2:        rgba(80,0,0,0.25);
        --color-text:            #ffffff;
        --color-text-sub:        rgba(255,255,255,0.35);
        --color-title:           #ff7070;
        --color-card-bg:         #ffffff;
        --color-card-text:       #500000;
        --color-card-record:     #888888;
        --color-tabs-bg:         rgba(0,0,0,0.35);
        --color-tab-inactive:    rgba(255,255,255,0.45);
        --color-tab-active-bg:   #500000;
        --color-tab-active-txt:  #ffffff;
        --color-section-title:   rgba(255,255,255,0.65);
        --color-sched-bg:        rgba(255,255,255,0.05);
        --color-sched-border:    rgba(255,255,255,0.1);
        --color-sched-divider:   rgba(255,255,255,0.07);
        --color-sched-date:      rgba(255,255,255,0.6);
        --color-sched-opp:       rgba(255,255,255,0.9);
        --color-sched-rank:      rgba(255,255,255,0.55);
        --color-sched-upcoming:  rgba(255,255,255,0.35);
        --color-sched-next-bg:   rgba(80,0,0,0.4);

        --color-btn-bg:          rgba(255,255,255,0.09);
        --color-btn-txt:         #ffffff;
        --color-btn-border:      rgba(255,255,255,0.15);
        --color-btn-action-bg:   #500000;
        --color-btn-action-txt:  #ffffff;
        --color-stop-bg:         rgba(220,48,48,0.18);
        --color-stop-txt:        #ff8080;
        --color-stop-border:     rgba(220,48,48,0.3);
        --color-toggle-bg:       rgba(255,255,255,0.1);
        --color-toggle-txt:      rgba(255,255,255,0.8);
        --color-loading:         rgba(255,255,255,0.4);
        --shadow-card:           0 8px 32px rgba(0,0,0,0.5);
    }

    /* LIGHT MODE */
    [data-theme="light"] {
        --color-bg:              #f2f2f2;
        --color-bg-glow1:        rgba(80,0,0,0.05);
        --color-bg-glow2:        rgba(80,0,0,0.03);
        --color-text:            #1a1a1a;
        --color-text-sub:        rgba(0,0,0,0.4);
        --color-title:           #500000;
        --color-card-bg:         #ffffff;
        --color-card-text:       #500000;
        --color-card-record:     #888888;
        --color-tabs-bg:         rgba(0,0,0,0.07);
        --color-tab-inactive:    rgba(0,0,0,0.4);
        --color-tab-active-bg:   #500000;
        --color-tab-active-txt:  #ffffff;
        --color-section-title:   #500000;
        --color-sched-bg:        #ffffff;
        --color-sched-border:    rgba(0,0,0,0.1);
        --color-sched-divider:   rgba(0,0,0,0.07);
        --color-sched-date:      #500000;
        --color-sched-opp:       #1a1a1a;
        --color-sched-rank:      #6b0000;
        --color-sched-upcoming:  rgba(0,0,0,0.32);
        --color-sched-next-bg:   rgba(80,0,0,0.06);

        --color-btn-bg:          rgba(80,0,0,0.07);
        --color-btn-txt:         #500000;
        --color-btn-border:      rgba(80,0,0,0.15);
        --color-btn-action-bg:   #500000;
        --color-btn-action-txt:  #ffffff;
        --color-stop-bg:         rgba(200,0,0,0.08);
        --color-stop-txt:        #c00;
        --color-stop-border:     rgba(200,0,0,0.2);
        --color-toggle-bg:       rgba(80,0,0,0.08);
        --color-toggle-txt:      #500000;
        --color-loading:         rgba(0,0,0,0.32);
        --shadow-card:           0 4px 20px rgba(0,0,0,0.1);
    }

    /* ============================================================
       BASE
    ============================================================ */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
        background-color: var(--color-bg);
        background-image:
            radial-gradient(ellipse at 20% 0%,   var(--color-bg-glow1) 0%, transparent 60%),
            radial-gradient(ellipse at 80% 100%, var(--color-bg-glow2) 0%, transparent 60%);
        color: var(--color-text);
        font-family: var(--font-body);
        margin: 0; padding: 16px; min-height: 100vh;
        transition: background-color 0.25s, color 0.25s;
    }
    .container { max-width: 680px; margin: auto; }

    /* ============================================================
       HEADER
    ============================================================ */
    header { text-align: center; padding: 10px 0 16px; position: relative; }
    header h1 {
        font-family: var(--font-display);
        font-size: clamp(1.6rem, 6vw, 2.4rem);
        margin: 0; letter-spacing: 3px;
        color: var(--color-title);
    }

    /* Sun/Moon SVG button — top-right, circular */
    .mode-toggle {
        position: absolute; top: 10px; right: 0;
        background: var(--color-toggle-bg);
        color: var(--color-toggle-txt);
        border: 1px solid var(--color-btn-border);
        border-radius: 50%; width: 34px; height: 34px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; padding: 0; transition: all 0.2s;
    }
    .mode-toggle:hover { opacity: 0.75; transform: scale(1.1); }
    .mode-toggle svg { width: 16px; height: 16px; display: block; }

    /* ============================================================
       SPORT TABS
    ============================================================ */
    .tabs {
        display: flex; gap: 6px; margin-bottom: 14px;
        background: var(--color-tabs-bg);
        border-radius: var(--radius-card); padding: 5px;
    }
    .tab-btn {
        flex: 1; padding: 10px 4px; cursor: pointer;
        background: transparent; border: 1px solid transparent;
        border-radius: 10px; color: var(--color-tab-inactive);
        font-weight: 900; font-family: var(--font-body);
        font-size: clamp(0.68rem, 2.8vw, 0.88rem); transition: all 0.2s;
    }
    .tab-btn:hover  { opacity: 0.75; }
    .tab-btn.active { background: var(--color-tab-active-bg); color: var(--color-tab-active-txt); }

    /* ============================================================
       GAME CARD
       Strict 3-col grid keeps both team columns identical width
       so logos / names / records are always at the same altitude.
    ============================================================ */
    .game-card {
        background: var(--color-card-bg);
        border-radius: var(--radius-card);
        padding: 18px 12px; margin-bottom: 14px;
        min-height: 130px; box-shadow: var(--shadow-card);
        display: grid; grid-template-columns: 1fr auto 1fr;
        /* stretch so gc-center fills full height; teams align to top */
        align-items: start;
        gap: 8px; transition: background 0.25s;
    }
    /* Center column stays vertically centered within the card */
    .game-card .gc-center {
        align-self: center;
    }
    .game-card.empty {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 8px; text-align: center;
    }
    .gc-empty-label  { font-family: var(--font-display); font-size: 1.3rem; color: var(--color-card-text); letter-spacing: 2px; }
    .gc-empty-record { color: var(--color-card-record); font-size: 0.82rem; font-weight: 700; }

    /* Team columns use CSS grid with 3 fixed rows:
       row 1 = logo (fixed var(--logo-size))
       row 2 = name + optional rank badge (fixed 1.4em)
       row 3 = record (fixed 1em)
       Both .gc-team columns share the SAME row heights via the
       outer game-card grid — so everything lines up perfectly. */
    .gc-team {
        display: grid;
        grid-template-rows: var(--logo-size) 1.8em 1.2em;
        align-items: center;
        justify-items: center;
        text-align: center;
        gap: 4px;
    }
    .gc-logo {
        width: var(--logo-size); height: var(--logo-size);
        object-fit: contain; display: block;
    }
    .gc-logo-placeholder {
        width: var(--logo-size); height: var(--logo-size);
        background: #f0eaea; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.62rem; font-weight: 900; color: #aaa; letter-spacing: 0.5px;
    }
    /* Name row: rank badge + team name, vertically centered in its row */
    .gc-name-row {
        display: flex; align-items: center; justify-content: center;
        gap: 4px; flex-wrap: wrap; width: 100%;
        font-size: clamp(0.6rem, 2.2vw, 0.78rem); font-weight: 900;
        color: var(--color-card-text); line-height: 1.2;
    }
    .gc-rank-badge {
        background: var(--color-maroon); color: #fff;
        font-size: 0.58rem; font-weight: 900;
        padding: 1px 5px; border-radius: 4px; white-space: nowrap;
        flex-shrink: 0;
    }
    /* Record row — always present even if empty, keeps rows aligned */
    .gc-record {
        font-size: 0.65rem; font-weight: 700;
        color: var(--color-card-record);
        display: flex; align-items: center; justify-content: center;
        width: 100%;
    }

    /* Center column */
    .gc-center  { text-align: center; padding: 0 4px; }
    .gc-label   { font-family: var(--font-display); font-size: clamp(1.1rem,4.5vw,1.5rem); color: var(--color-card-text); letter-spacing: 3px; }
    .gc-status  { font-size: clamp(0.58rem,2vw,0.7rem); font-weight: 900; color: var(--color-live); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .gc-score   { font-family: var(--font-display); font-size: clamp(1.8rem,7vw,2.8rem); color: var(--color-maroon); line-height: 1; }
    .gc-date    { font-size: 0.68rem; font-weight: 700; color: #555; margin-top: 4px; }
    .gc-time    { font-size: 0.65rem; color: #888; }
    .gc-network { font-size: 0.6rem;  color: #aaa; margin-top: 2px; }

    /* ============================================================
       SCHEDULE
    ============================================================ */
    .section-title {
        font-family: var(--font-display); font-size: 0.85rem;
        letter-spacing: 2px; text-transform: uppercase;
        color: var(--color-section-title); margin: 0 0 10px 4px;
    }
    .schedule {
        background: var(--color-sched-bg);
        border: 1px solid var(--color-sched-border);
        border-radius: var(--radius-card);
        padding: 14px; margin-bottom: 18px; transition: background 0.25s;
    }
    .sched-item {
        display: grid; grid-template-columns: 62px 1fr 80px;
        gap: 6px; align-items: center;
        padding: 9px 4px;
        border-bottom: 1px solid var(--color-sched-divider);
        font-size: clamp(0.7rem, 2.4vw, 0.84rem);
    }
    .sched-item:last-child { border-bottom: none; }
    /* Next upcoming game gets a subtle highlight */
    .sched-item.next-game  { background: var(--color-sched-next-bg); border-radius: 8px; padding: 9px 8px; }
    .sched-date   { color: var(--color-sched-date); font-weight: 700; white-space: nowrap; }
    .sched-opp    { color: var(--color-sched-opp); font-weight: 700; }
    .sched-rank   { color: var(--color-sched-rank); font-size: 0.62rem; font-weight: 900; }
    .sched-result { text-align: right; font-weight: 900; white-space: nowrap; }
    .win          { color: var(--color-win); }
    .loss         { color: var(--color-loss); }
    .upcoming     { color: var(--color-sched-upcoming); font-size: 0.7rem; }
    .live-pill    { color: var(--color-live); }

    /* ============================================================
       SOUNDS
    ============================================================ */
    .sounds-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .audio-btn {
        padding: 14px 10px; border-radius: var(--radius-btn);
        font-weight: 900; font-family: var(--font-body);
        font-size: clamp(0.76rem, 2.8vw, 0.9rem); cursor: pointer;
        background: var(--color-btn-bg); color: var(--color-btn-txt);
        border: 1px solid var(--color-btn-border); transition: all 0.15s;
    }
    .audio-btn:hover  { opacity: 0.8; }
    .audio-btn:active { transform: scale(0.96); }
    .audio-btn.action { background: var(--color-btn-action-bg); color: var(--color-btn-action-txt); border-color: var(--color-btn-action-bg); }
    .audio-btn.stop-btn { background: var(--color-stop-bg); color: var(--color-stop-txt); border-color: var(--color-stop-border); }

    /* ============================================================
       MISC
    ============================================================ */
    @keyframes pulse  { 0%,100%{opacity:.3} 50%{opacity:.8} }
    @keyframes fadein { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
    .loading { animation: pulse 1.6s infinite; color: var(--color-loading); text-align: center; padding: 12px; font-size: 0.85rem; }
    .fadein  { animation: fadein 0.3s ease; }

    </style>
</head>
<body>
<div class="container">

    <header>
        <h1>AGGIE DASH</h1>
        <!-- Shows ☀️ when in dark mode (click to go light), 🌙 when in light mode (click to go dark) -->
        <button class="mode-toggle" onclick="toggleMode()" id="mode-btn" title="Toggle light/dark">
    <svg id="mode-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <!-- Sun rays + circle (shown in dark mode) -->
        <g id="icon-sun">
            <circle cx="12" cy="12" r="4"/>
            <line x1="12" y1="2"  x2="12" y2="5"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="2"  y1="12" x2="5"  y2="12"/>
            <line x1="19" y1="12" x2="22" y2="12"/>
            <line x1="4.22"  y1="4.22"  x2="6.34"  y2="6.34"/>
            <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
            <line x1="4.22"  y1="19.78" x2="6.34"  y2="17.66"/>
            <line x1="17.66" y1="6.34"  x2="19.78" y2="4.22"/>
        </g>
        <!-- Moon crescent (shown in light mode, hidden by default) -->
        <g id="icon-moon" style="display:none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </g>
    </svg>
</button>
    </header>

    <div class="tabs">
        <button id="btn-football"   class="tab-btn active" onclick="setSport('football')">Football</button>
        <button id="btn-basketball" class="tab-btn"        onclick="setSport('basketball-men')">Basketball</button>
        <button id="btn-baseball"   class="tab-btn"        onclick="setSport('baseball')">Baseball</button>
    </div>



    <!-- Main card: next game preview OR live score -->
    <div id="live-score" class="game-card empty fadein">
        <div style="font-weight:700;color:#888;font-size:0.9rem">Loading...</div>
    </div>

    <div class="schedule">
        <div class="section-title">Schedule</div>
        <div id="sched-list"><div class="loading">Loading schedule...</div></div>
    </div>

    <div class="section-title">Sounds</div>
    <div class="sounds-grid">
        <button class="audio-btn"        onclick="play('war_hymn.mp3')">War Hymn</button>
        <button class="audio-btn"        onclick="play('spirit.mp3')">Aggie Spirit</button>
        <button class="audio-btn action" onclick="play('touchdown.mp3')">TOUCHDOWN!</button>
        <button class="audio-btn action" onclick="play('homerun.mp3')">HOME RUN!</button>
        <button class="audio-btn stop-btn" id="stop-btn" onclick="stopAudio()" style="grid-column:1/-1;display:none;">Stop Audio</button>
    </div>

</div>
<script>
/* ================================================================
   CONFIGURATION
   Edit team IDs or add new sports here.
   To look up an ESPN team ID, run in browser console:
     fetch('https://site.api.espn.com/apis/site/v2/sports/SPORT/LEAGUE/teams?limit=500')
       .then(r=>r.json()).then(d=>console.log(
         d.sports[0].leagues[0].teams.find(t=>t.team.displayName.includes('Texas A&M'))
       ))
================================================================ */
const sportConfig = {
    'football': {
        espnSport:  'football',
        espnLeague: 'college-football',
        teamId:     '245',
    },
    'basketball-men': {
        espnSport:  'basketball',
        espnLeague: 'mens-college-basketball',
        teamId:     '245',
    },
    'baseball': {
        espnSport:  'baseball',
        espnLeague: 'college-baseball',
        teamId:     '123',   // confirmed via ESPN teams API
    },
};

/* ================================================================
   APP STATE
================================================================ */
let currentSport = 'football';
const ESPN = 'https://site.api.espn.com/apis/site/v2/sports';
const TZ   = 'America/Chicago'; // all times shown in Central

/* ================================================================
   LIGHT / DARK MODE TOGGLE
   ☀️ = currently dark, click to go light
   🌙 = currently light, click to go dark
   Preference saved to localStorage.
================================================================ */
function setModeIcon(theme) {
    // Sun shown in dark mode (click to go light), Moon in light mode (click to go dark)
    document.getElementById('icon-sun').style.display  = theme === 'dark'  ? '' : 'none';
    document.getElementById('icon-moon').style.display = theme === 'light' ? '' : 'none';
}
function toggleMode() {
    const html   = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    const next   = isDark ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    setModeIcon(next);
    localStorage.setItem('aggie-dash-theme', next);
}
(function initTheme() {
    const saved = localStorage.getItem('aggie-dash-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    setModeIcon(saved);
})();

/* ================================================================
   UTILITY HELPERS
================================================================ */

// YYYYMMDD string for ESPN scoreboard endpoint
function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

// Format time in Central Time
function toCT(date) {
    return date.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', timeZone: TZ });
}

// Format date in Central Time
function toCTDate(date, opts) {
    return date.toLocaleDateString('en-US', { ...opts, timeZone: TZ });
}

// Extract numeric score — ESPN returns either { value: 74 } or "74"
function getScore(c) {
    const v = c?.score?.value ?? c?.score;
    return (v !== undefined && v !== null) ? parseFloat(v) : null;
}

// AP poll rank — ESPN returns 99 for unranked
function getRank(c) {
    const r = c?.curatedRank?.current || c?.rank;
    return (r && r < 99) ? r : null;
}

// W-L record from ESPN's records array
function getRecord(c) {
    if (!c) return '';
    const recs = c.records || [];
    const r = recs.find(x => x.type === 'total' || x.name === 'overall' || x.abbreviation === 'Game');
    return r?.summary || recs[0]?.summary || '';
}

// Best logo URL: schedule API gives logos[], scoreboard gives logo string
function getLogo(team) {
    if (!team) return '';
    if (team.logos?.length) {
        const big = team.logos.find(l => l.width >= 200) || team.logos[0];
        return (big.href || '').replace('http://', 'https://');
    }
    if (team.logo) return team.logo.replace('http://', 'https://');
    if (team.id)   return `https://a.espncdn.com/i/teamlogos/colleges/500/${team.id}.png`;
    return '';
}

// <img> tag or TBD placeholder
function logoImg(team) {
    const src = getLogo(team);
    if (!src) return `<div class="gc-logo-placeholder">TBD</div>`;
    return `<img class="gc-logo" src="${src}" onerror="this.outerHTML='<div class=\\'gc-logo-placeholder\\'>TBD</div>'" alt="">`;
}

// Rank badge HTML
function rankBadge(rank) {
    return rank ? `<span class="gc-rank-badge">#${rank}</span>` : '';
}



/* ================================================================
   FETCH
================================================================ */

// Live/today scoreboard — find A&M game if one exists.
// Tries multiple ESPN scoreboard URLs because tournament games (SEC, NCAA)
// are sometimes only returned with specific group/date parameters.
async function fetchLiveScore(cfg) {
    const findAggies = events =>
        (events || []).find(e =>
            e.competitions?.[0]?.competitors?.some(c => c.team?.id === cfg.teamId)
        ) || null;

    // CDT-correct date string
    const local = new Date(new Date().toLocaleString('en-US', {timeZone: 'America/Chicago'}));
    const ymd   = `${local.getFullYear()}${String(local.getMonth()+1).padStart(2,'0')}${String(local.getDate()).padStart(2,'0')}`;
    const base  = `${ESPN}/${cfg.espnSport}/${cfg.espnLeague}/scoreboard`;

    // Try all these URLs in order, return first one that finds A&M
    const urls = [
        base,                                    // default — live games
        `${base}?dates=${ymd}`,                  // today CDT
        `${base}?dates=${ymd}&groups=50&limit=300`, // SEC tournament
        `${base}?dates=${ymd}&limit=300`,        // all today with higher limit
    ];

    for (const url of urls) {
        try {
            const r = await fetch(url);
            if (!r.ok) continue;
            const d = await r.json();
            const hit = findAggies(d.events);
            if (hit) return hit;
        } catch(e) { /* try next */ }
    }
    return null;
}

// Full season schedule.
// Football straddles Aug-Jan — pre-August we fetch the prior year.
async function fetchSchedule(cfg) {
    const now  = new Date();
    let year   = now.getFullYear();
    // Football: season is Aug-Jan, so Jan-Jul belongs to prior year
    if (cfg.espnLeague === 'college-football' && now.getMonth() < 7) year -= 1;
    // Basketball: ESPN uses the year the season ENDS, so 2025-26 season = 2026
    // No adjustment needed — current year is always correct for basketball
    // Baseball: season is Feb-Jun, current year is correct
    const url  = `${ESPN}/${cfg.espnSport}/${cfg.espnLeague}/teams/${cfg.teamId}/schedule?season=${year}`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    return data.events || [];
}

/* ================================================================
   RENDER — LIVE / TODAY SCORE CARD
================================================================ */
function renderLiveScore(event, cfg) {
    const el   = document.getElementById('live-score');
    const comp = event.competitions[0];
    const home = comp.competitors.find(c => c.homeAway === 'home');
    const away = comp.competitors.find(c => c.homeAway === 'away');
    const st   = comp.status?.type;

    let statusText;
    if (st?.completed) {
        statusText = 'FINAL' + (st.shortDetail?.includes('OT') ? '/OT' : '');
    } else if (st?.state === 'in') {
        const clock  = comp.status?.displayClock || '';
        const period = comp.status?.period;
        statusText   = `LIVE  ${clock}${period ? '  P'+period : ''}`;
    } else {
        // Format upcoming game time in CDT instead of ESPN's default EDT string
        const gameTime = event.date ? toCT(new Date(event.date)) + ' CDT' : 'UPCOMING';
        statusText = gameTime;
    }

    const network = comp.broadcasts?.[0]?.names?.[0] || comp.geoBroadcasts?.[0]?.media?.shortName || '';

    // Hide pre-game UI when showing a live/today game

    el.className = 'game-card fadein';
    el.innerHTML = `
        <div class="gc-team">
            ${logoImg(away.team)}
            <div class="gc-name-row">${rankBadge(getRank(away))}${away.team.shortDisplayName}</div>
            <div class="gc-record">${getRecord(away)}</div>
        </div>
        <div class="gc-center">
            <div class="gc-status">${statusText}</div>
            <div class="gc-score">${away.score ?? '–'} – ${home.score ?? '–'}</div>
            ${network ? `<div class="gc-network">${network}</div>` : ''}
        </div>
        <div class="gc-team">
            ${logoImg(home.team)}
            <div class="gc-name-row">${rankBadge(getRank(home))}${home.team.shortDisplayName}</div>
            <div class="gc-record">${getRecord(home)}</div>
        </div>`;
}

/* ================================================================
   RENDER — NEXT GAME CARD (or OFFSEASON)
================================================================ */
function renderNextGame(events, cfg) {
    const el  = document.getElementById('live-score');
    const now = Date.now();

    // Compute W-L record from all completed games
    let w = 0, l = 0;
    events.forEach(e => {
        const comp = e.competitions?.[0];
        const us   = comp?.competitors?.find(c => c.team?.id === cfg.teamId);
        const them = comp?.competitors?.find(c => c.team?.id !== cfg.teamId);
        if (!comp?.status?.type?.completed || !us || !them) return;
        const uS = getScore(us), tS = getScore(them);
        if (uS !== null && tS !== null) uS > tS ? w++ : l++;
    });
    const recStr = w + l > 0 ? `${w}-${l}` : '';

    // Find next upcoming game
    const next = events.find(e =>
        new Date(e.date) > now && !e.competitions?.[0]?.status?.type?.completed
    );

    // OFFSEASON — no upcoming games
    if (!next) {
        el.className = 'game-card empty fadein';
        el.innerHTML = `
            <div class="gc-empty-label">OFFSEASON</div>
            ${recStr ? `<div class="gc-empty-record">Final Record: ${recStr}</div>` : ''}`;
        return;
    }

    // Build the next game card
    const comp    = next.competitions[0];
    const aggies  = comp.competitors.find(c => c.team?.id === cfg.teamId);
    const opp     = comp.competitors.find(c => c.team?.id !== cfg.teamId);
    const isHome  = aggies?.homeAway === 'home';
    const gd      = new Date(next.date);
    const dateStr = toCTDate(gd, { weekday:'short', month:'short', day:'numeric' });
    const timeStr = toCT(gd) + ' CDT';
    const network = comp.broadcasts?.[0]?.names?.[0] || comp.geoBroadcasts?.[0]?.media?.shortName || '';
    const ourRec  = getRecord(aggies) || recStr;
    const oppRec  = getRecord(opp);

    el.className = 'game-card fadein';
    el.innerHTML = `
        <div class="gc-team">
            ${logoImg(aggies?.team)}
            <div class="gc-name-row">${rankBadge(getRank(aggies))}Texas A&M</div>
            <div class="gc-record">${ourRec}</div>
        </div>
        <div class="gc-center">
            <div class="gc-label">${isHome ? 'VS' : 'AT'}</div>
            <div class="gc-date">${dateStr}</div>
            <div class="gc-time">${timeStr}</div>
            ${network ? `<div class="gc-network">${network}</div>` : ''}
        </div>
        <div class="gc-team">
            ${logoImg(opp?.team)}
            <div class="gc-name-row">${rankBadge(getRank(opp))}${opp?.team?.shortDisplayName || 'TBD'}</div>
            <div class="gc-record">${oppRec}</div>
        </div>`;
}

/* ================================================================
   RENDER — SCHEDULE LIST
================================================================ */
function renderSchedule(events, cfg) {
    const el = document.getElementById('sched-list');
    if (!events.length) { el.innerHTML = '<div class="loading">No schedule found.</div>'; return; }

    const now    = Date.now();
    const nextEv = events.find(e =>
        new Date(e.date) > now && !e.competitions?.[0]?.status?.type?.completed
    );

    let html = '';
    events.forEach(event => {
        const comp     = event.competitions?.[0];
        const aggies   = comp?.competitors?.find(c => c.team?.id === cfg.teamId);
        const opp      = comp?.competitors?.find(c => c.team?.id !== cfg.teamId);
        const homeAway = aggies?.homeAway === 'home' ? 'vs' : '@';
        const oppName  = opp?.team?.shortDisplayName || opp?.team?.displayName || 'TBD';
        const oppRank  = getRank(opp);
        const gd       = new Date(event.date);
        const dateStr  = toCTDate(gd, { month:'short', day:'numeric' });
        const timeStr  = toCT(gd) + ' CDT';
        const done     = comp?.status?.type?.completed;
        const inProg   = comp?.status?.type?.state === 'in';
        const isNext   = event === nextEv;

        let result = '';
        if (done) {
            const us = getScore(aggies), them = getScore(opp);
            const won = us !== null && them !== null && us > them;
            result = `<span class="sched-result ${won ? 'win' : 'loss'}">${won ? 'W' : 'L'} ${us ?? '?'}-${them ?? '?'}</span>`;
        } else if (inProg) {
            const us = getScore(aggies) ?? '–', them = getScore(opp) ?? '–';
            result = `<span class="sched-result live-pill">LIVE ${us}-${them}</span>`;
        } else {
            result = `<span class="sched-result upcoming">${timeStr}</span>`;
        }

        html += `
            <div class="sched-item${isNext ? ' next-game' : ''}">
                <span class="sched-date">${dateStr}</span>
                <span class="sched-opp">${homeAway} ${oppRank ? `<span class="sched-rank">#${oppRank} </span>` : ''}${oppName}</span>
                ${result}
            </div>`;
    });
    el.innerHTML = html;
}

/* ================================================================
   MAIN REFRESH — runs on load + every 60 seconds
================================================================ */
async function refresh() {
    const cfg = sportConfig[currentSport];
    let events = [];

    try {
        events = await fetchSchedule(cfg);
        renderSchedule(events, cfg);
    } catch(e) {
        console.warn('Schedule fetch failed:', e);
        document.getElementById('sched-list').innerHTML = '<div class="loading">Schedule unavailable.</div>';
    }

    try {
        const live = await fetchLiveScore(cfg);
        if (live) {
            const st = live.competitions?.[0]?.status?.type;
            // Only use live card if game is actually in progress or completed today
            // If it's a future game (state=pre), fall through to next-game card which shows date+time
            if (st?.state === 'in' || st?.completed) {
                renderLiveScore(live, cfg);
            } else {
                renderNextGame(events, cfg);
            }
        } else {
            renderNextGame(events, cfg);
        }
    } catch(e) {
        console.warn('Score fetch failed:', e);
        renderNextGame(events, cfg);
    }
}

/* ================================================================
   TAB SWITCHING
================================================================ */
function setSport(sport) {
    currentSport = sport;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    const idMap = { 'football':'btn-football', 'basketball-men':'btn-basketball', 'baseball':'btn-baseball' };
    document.getElementById(idMap[sport]).classList.add('active');

    document.getElementById('live-score').className  = 'game-card empty';
    document.getElementById('live-score').innerHTML  = `<div style="font-weight:700;color:#888">Loading...</div>`;
    document.getElementById('sched-list').innerHTML  = '<div class="loading">Loading...</div>';

    refresh();
}

/* ================================================================
   AUDIO PLAYER
================================================================ */
let currentAudio = null;

function play(file) {
    if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
    const a = new Audio(file);
    a.play().catch(() => console.log('Audio file not found:', file));
    currentAudio = a;
    document.getElementById('stop-btn').style.display = 'block';
    a.addEventListener('ended', () => {
        currentAudio = null;
        document.getElementById('stop-btn').style.display = 'none';
    });
}

function stopAudio() {
    if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
    document.getElementById('stop-btn').style.display = 'none';
}

/* ================================================================
   INIT
================================================================ */
setInterval(refresh, 60000); // refresh every 60 seconds
refresh();
</script>
